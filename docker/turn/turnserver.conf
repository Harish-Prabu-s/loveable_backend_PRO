# /etc/turnserver.conf

# Listening port for STUN and TURN
listening-port=3478

# WebRTC requirements
fingerprint
lt-cred-mech

# Use long-term credentials mechanism with a static secret
use-auth-secret
static-auth-secret=CHANGEME_SECURE_SECRET_RANDOM_STRING
realm=loveable-turn

# Replace with your public IP
external-ip=72.62.195.63

# Log to stdout
no-stdout-log
log-file=stdout

# Max port range for relay
min-port=49152
max-port=65535
